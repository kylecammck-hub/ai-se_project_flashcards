<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Your Name" />
    <meta
      name="description"
      content="A flashcard app to help you study and memorize topics more effectively."
    />
    <meta
      name="keywords"
      content="flashcards, study aids, learning materials, memorization"
    />
    <title>Flash Cards</title>
    <link rel="icon" href="favicon.ico" />
    <link rel="stylesheet" href="assets/vendor/normalize.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="page">
    <header class="header">
      <h1 class="header__title">
        <a class="header__link" href="/">Flash Cards</a>
      </h1>
      <nav class="nav">
        <ul class="nav__links">
          <li><a class="nav__link" href="/">My Decks</a></li>
          <li><a class="nav__link" href="#">About</a></li>
        </ul>
      </nav>
    </header>

    <main class="page__main-content page__main-content_type_carousel">
      <section class="carousel">
        <h2 class="carousel__title">HTML &amp; CSS Basics &middot; Card 1 of 20</h2>

        <div class="carousel__content">
          <button
            class="carousel__btn carousel__btn_type_left carousel__btn_disabled"
            type="button"
            aria-label="Previous card"
          >
            <img src="assets/images/left.svg" alt="Previous" />
          </button>

          <div class="carousel__card">
            <p class="carousel__card-text">&lt;body&gt;&lt;/body&gt;</p>
          </div>

          <button
            class="carousel__btn carousel__btn_type_right"
            type="button"
            aria-label="Next card"
          >
            <img src="assets/images/right.svg" alt="Next" />
          </button>
        </div>

        <button
          class="carousel__btn carousel__btn_type_flip"
          type="button"
          aria-label="Flip card"
        >
          <img src="assets/images/flip.svg" alt="Flip" />
        </button>
      </section>
    </main>

    <footer class="footer">
      <p class="footer__text">&copy; 2024 Flash Cards. All rights reserved.</p>
    </footer>
  </body>
</html>
