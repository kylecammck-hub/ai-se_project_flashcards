<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Your Name" />
    <meta
      name="description"
      content="A flashcard app to help you study and memorize topics more effectively."
    />
    <meta
      name="keywords"
      content="flashcards, study aids, learning materials, memorization"
    />
    <title>Flash Cards</title>
    <link rel="icon" href="favicon.ico" />
    <link rel="stylesheet" href="assets/vendor/normalize.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="page">
    <header class="header">
      <h1 class="header__title">
        <a class="header__link" href="/">Flash Cards</a>
      </h1>
      <nav class="nav">
        <ul class="nav__links">
          <li><a class="nav__link" href="/">My Decks</a></li>
          <li><a class="nav__link" href="#">About</a></li>
        </ul>
      </nav>
    </header>

    <main class="page__main-content">
      <section class="decks">
        <h2 class="decks__title">My Decks</h2>
        <ul class="decks__list">

          <li class="deck deck_color_green">
            <h3 class="deck__title">HTML & CSS Basics</h3>
            <div class="deck__row">
              <p class="deck__count">20 cards</p>
              <button class="deck__delete-btn" type="button" aria-label="Delete this deck">
                <img src="assets/images/delete.svg" alt="Delete" />
              </button>
            </div>
          </li>

          <li class="deck deck_color_blue">
            <h3 class="deck__title">JavaScript Fundamentals</h3>
            <div class="deck__row">
              <p class="deck__count">35 cards</p>
              <button class="deck__delete-btn" type="button" aria-label="Delete this deck">
                <img src="assets/images/delete.svg" alt="Delete" />
              </button>
            </div>
          </li>

          <li class="deck deck_color_pink">
            <h3 class="deck__title">React Hooks</h3>
            <div class="deck__row">
              <p class="deck__count">15 cards</p>
              <button class="deck__delete-btn" type="button" aria-label="Delete this deck">
                <img src="assets/images/delete.svg" alt="Delete" />
              </button>
            </div>
          </li>

          <li class="deck deck_color_purple">
            <h3 class="deck__title">Data Structures</h3>
            <div class="deck__row">
              <p class="deck__count">40 cards</p>
              <button class="deck__delete-btn" type="button" aria-label="Delete this deck">
                <img src="assets/images/delete.svg" alt="Delete" />
              </button>
            </div>
          </li>

          <li class="deck deck_color_orange">
            <h3 class="deck__title">Algorithms</h3>
            <div class="deck__row">
              <p class="deck__count">28 cards</p>
              <button class="deck__delete-btn" type="button" aria-label="Delete this deck">
                <img src="assets/images/delete.svg" alt="Delete" />
              </button>
            </div>
          </li>

        </ul>
        <button class="decks__new-deck-btn" type="button">+ New Deck</button>
      </section>
    </main>

    <footer class="footer">
      <p class="footer__text">&copy; 2024 Flash Cards. All rights reserved.</p>
    </footer>
  </body>
</html>
